<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="tablet-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6b4e"/>
      <stop offset="100%" stop-color="#6ec9a8"/>
    </linearGradient>
  </defs>
  <!-- Landscape tablet — wide, short, clearly different from phone -->
  <rect x="1" y="5" width="22" height="14" rx="2.5" stroke="url(#tablet-g)"/>
  <!-- Front camera dot on left bezel -->
  <circle cx="3.5" cy="12" r="0.8" fill="url(#tablet-g)"/>
  <!-- Screen content hints -->
  <line x1="7" y1="9" x2="15" y2="9" stroke="url(#tablet-g)" stroke-width="1" opacity="0.4"/>
  <line x1="7" y1="12" x2="19" y2="12" stroke="url(#tablet-g)" stroke-width="1" opacity="0.4"/>
  <line x1="7" y1="15" x2="13" y2="15" stroke="url(#tablet-g)" stroke-width="1" opacity="0.4"/>
</svg>
